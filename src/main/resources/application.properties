spring.application.name=secureuserapi

# Database — configure via environment variables or local override
# spring.datasource.url=jdbc:postgresql://localhost:5432/secureuser
# spring.datasource.username=
# spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT — configure via environment variables
# jwt.secret=
jwt.expiration=86400000
jwt.issuer=secureuserapi

# Rate limiting — login endpoint (per IP, sliding window)
rate-limit.login.max-requests=5
rate-limit.login.window-seconds=60
