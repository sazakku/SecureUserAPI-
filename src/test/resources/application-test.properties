# In-memory H2 datasource for @SpringBootTest context loads test
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT — minimal values for context load
jwt.secret=test-secret-key-that-is-long-enough-for-hmac-sha256-signing
jwt.expiration=86400000
jwt.issuer=secureuserapi-test

# Rate limiting — relaxed for tests (default values still apply in unit tests)
rate-limit.login.max-requests=5
rate-limit.login.window-seconds=60
